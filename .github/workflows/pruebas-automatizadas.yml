name: Pruebas Automatizadas — SWIPRE-MED

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Suite a ejecutar'
        required: false
        default: 'all'
        type: choice
        options: [all, CP-001, CP-002]

jobs:
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.4
        env:
          MARIADB_ROOT_PASSWORD: ''
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 'yes'
          MARIADB_DATABASE: swipre_med
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring

      - name: Cargar schema y seed
        run: |
          mysql -u root -h 127.0.0.1 -P 3307 swipre_med < database/schema.sql
          mysql -u root -h 127.0.0.1 -P 3307 swipre_med < database/seed_data.sql
          php database/seed_passwords.php | mysql -u root -h 127.0.0.1 -P 3307 swipre_med

      - name: Ajustar config para CI
        # En CI se sirve desde la raíz, BASE_URL debe ser vacío
        run: |
          sed -i "s|define('BASE_URL', '/swipre-med/public')|define('BASE_URL', '')|" public/index.php
          sed -i "s|define('DB_HOST', 'localhost')|define('DB_HOST', '127.0.0.1')|" config/config.php
          sed -i "s|define('DB_PORT', 3306)|define('DB_PORT', 3307)|" config/config.php

      - name: Iniciar servidor PHP
        run: |
          php -S 0.0.0.0:8080 tests/ci-router.php &
          sleep 2
          curl -sf http://localhost:8080/login | grep -q 'SWIPRE-MED' && echo "Servidor OK"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Playwright
        working-directory: tests
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Ejecutar CP-001 — Consultar Medicamento
        if: ${{ github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'CP-001' || github.event.inputs.test_suite == '' }}
        working-directory: tests
        env:
          BASE_URL: http://localhost:8080
        run: npx playwright test e2e/consultar-medicamento.spec.js --config=playwright.config.js

      - name: Ejecutar CP-002 — Reporte Top 5
        if: ${{ github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'CP-002' || github.event.inputs.test_suite == '' }}
        working-directory: tests
        env:
          BASE_URL: http://localhost:8080
        run: npx playwright test e2e/reporte-top5.spec.js --config=playwright.config.js

      - name: Subir reporte HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

  comment-pr:
    name: Comentar resultado en PR
    runs-on: ubuntu-latest
    needs: e2e
    if: always() && github.event_name == 'pull_request'

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const ok     = '${{ needs.e2e.result }}' === 'success';
            const emoji  = ok ? '✅' : '❌';
            const estado = ok ? 'Aprobado' : 'Fallido';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body: `## ${emoji} Pruebas Automatizadas — SWIPRE-MED (Run #${{ github.run_number }})

            | Suite | Casos | Estado |
            |---|---|---|
            | CP-001 — Consultar Medicamento | 8 | ${emoji} ${estado} |
            | CP-002 — Reporte Top 5 Buscados | 10 | ${emoji} ${estado} |

            > Reporte HTML completo disponible en los **Artifacts** de este run.`,
            });
