name: Pruebas Automatizadas — SWIPRE-MED

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Suite a ejecutar'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - CP-001
          - CP-002

jobs:
  # ============================================================
  # JOB 1: Preparar base de datos y servidor PHP
  # ============================================================
  setup-and-test:
    name: Setup + E2E Tests
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.4
        env:
          MARIADB_ROOT_PASSWORD: ''
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 'yes'
          MARIADB_DATABASE: swipre_med
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mariadb-admin ping -h localhost --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring
          coverage: none

      - name: Cargar schema y datos de prueba
        run: |
          mysql -u root -h 127.0.0.1 -P 3307 swipre_med < database/schema.sql
          mysql -u root -h 127.0.0.1 -P 3307 swipre_med < database/seed_data.sql
          php database/seed_passwords.php | mysql -u root -h 127.0.0.1 -P 3307 swipre_med
        env:
          MYSQL_PWD: ''

      - name: Ajustar config para CI
        run: |
          sed -i "s/define('DB_HOST', '127.0.0.1')/define('DB_HOST', '127.0.0.1')/" config/config.php
          sed -i "s/define('DB_PORT', 3307)/define('DB_PORT', 3307)/" config/config.php

      - name: Iniciar servidor PHP integrado
        run: |
          php -S 0.0.0.0:8080 -t public/ &
          sleep 2
          curl -s http://localhost:8080/ | head -5
        env:
          BASE_URL: http://localhost:8080

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias Playwright
        run: |
          npm init -y
          npm install --save-dev @playwright/test
          npx playwright install chromium --with-deps

      - name: Ejecutar CP-001 — Consultar Medicamento
        if: ${{ github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'CP-001' || github.event.inputs.test_suite == '' }}
        run: |
          npx playwright test tests/e2e/consultar-medicamento.spec.js \
            --reporter=html \
            --output=test-results/CP-001
        env:
          BASE_URL: http://localhost:8080/swipre-med/public

      - name: Ejecutar CP-002 — Reporte Top 5
        if: ${{ github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'CP-002' || github.event.inputs.test_suite == '' }}
        run: |
          npx playwright test tests/e2e/reporte-top5.spec.js \
            --reporter=html \
            --output=test-results/CP-002
        env:
          BASE_URL: http://localhost:8080/swipre-med/public

      - name: Subir reporte de resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pruebas-${{ github.run_number }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # ============================================================
  # JOB 2: Resumen de resultados en PR
  # ============================================================
  report-summary:
    name: Resumen en PR
    runs-on: ubuntu-latest
    needs: setup-and-test
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Descargar reporte
        uses: actions/download-artifact@v4
        with:
          name: reporte-pruebas-${{ github.run_number }}
          path: ./reporte

      - name: Comentar resultado en PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const status = '${{ needs.setup-and-test.result }}';
            const emoji  = status === 'success' ? '✅' : '❌';
            const body = `## ${emoji} Pruebas Automatizadas — SWIPRE-MED

            | Suite | Casos | Estado |
            |---|---|---|
            | CP-001 Consultar Medicamento | 8 casos | ${status === 'success' ? '✅ Aprobado' : '❌ Fallido'} |
            | CP-002 Reporte Top 5 | 10 casos | ${status === 'success' ? '✅ Aprobado' : '❌ Fallido'} |

            > Reporte completo disponible en los **Artifacts** de este workflow (Run #${{ github.run_number }}).`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
